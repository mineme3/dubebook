name: dubebook
description: "A professional credit management system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  timezone: ^0.11.0
  path: ^1.9.1
  permission_handler: ^11.4.0
  google_fonts: ^8.1.0

  # Riverpod Stack (as per latest professional standards and your documentation)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  dio: ^5.8.0
  flutter_secure_storage: ^10.3.0
  flutter_dotenv: ^5.2.1
  go_router: ^14.8.0
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.5
  plugin_platform_interface: ^2.1.8

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "./assets/images/app_icon.png"
  adaptive_icon_background: "#1E1E2E"
  adaptive_icon_foreground: "./assets/images/app_icon_foreground.png"
